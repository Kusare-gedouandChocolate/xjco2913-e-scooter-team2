name: CI

on:
  # PR 合并前质量门禁
  pull_request:
    branches: [main]
  # 分支提交自检（覆盖 feature/fix 开发分支）
  push:
    branches: [main, "feature/**", "fix/**"]
  # 允许手动触发（演示前可临时跑一次）
  workflow_dispatch:

permissions:
  contents: read

# 同一分支重复推送时自动取消旧任务，节省 CI 资源
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-sanity:
    name: Workflow Sanity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 校验 workflow 语法，避免 CI 文件本身出错
      - name: Validate workflow files
        uses: rhysd/actionlint@v1.7.7

  docs-lint:
    name: Docs Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md

  frontend-ci:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 与 Vite/React-Router 的 engine 要求对齐（>=20.19）
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      # 当前项目暂未强制前端 test 脚本，存在则执行
      - name: Run frontend tests
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build

  backend-java-ci:
    name: Backend(Java) Build/Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # 先跑单元测试（若后续添加测试会自动纳入）
      - name: Run backend tests
        run: mvn -B -ntp test

      # 再验证可打包，保证主分支可构建
      - name: Build backend package
        run: mvn -B -ntp -DskipTests package
