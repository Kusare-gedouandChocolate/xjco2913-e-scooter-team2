name: CI

on:
  # 对 PR 做质量检查，保证合并前可见问题
  pull_request:
  # 保留 push 触发，便于分支自检
  push:

permissions:
  contents: read

jobs:
  workflow-sanity:
    name: Workflow Sanity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 校验 GitHub Actions 工作流语法，避免 workflow 本身写错
      - name: Validate workflow files
        uses: rhysd/actionlint@v1.7.7

  docs-lint:
    name: Docs Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 先对 Markdown 做基础规范检查，当前仓库主要是文档内容
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md

  frontend-ci:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: detect_frontend
        run: |
          if [ -f frontend/package.json ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: ${{ steps.detect_frontend.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: ${{ steps.detect_frontend.outputs.enabled == 'true' }}
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 使用 --if-present，允许早期阶段某些脚本暂未提供
      - name: Run frontend lint
        if: ${{ steps.detect_frontend.outputs.enabled == 'true' }}
        working-directory: frontend
        run: npm run lint --if-present

      - name: Run frontend tests
        if: ${{ steps.detect_frontend.outputs.enabled == 'true' }}
        working-directory: frontend
        run: npm run test --if-present

      - name: Build frontend
        if: ${{ steps.detect_frontend.outputs.enabled == 'true' }}
        working-directory: frontend
        run: npm run build --if-present

      - name: Skip frontend CI
        if: ${{ steps.detect_frontend.outputs.enabled != 'true' }}
        run: echo "frontend/package.json not found. Skip frontend CI."

  backend-node-ci:
    name: Backend(Node) Lint/Test/Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend node project
        id: detect_backend_node
        run: |
          if [ -f backend/package.json ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: ${{ steps.detect_backend_node.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: ${{ steps.detect_backend_node.outputs.enabled == 'true' }}
        working-directory: backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run backend lint
        if: ${{ steps.detect_backend_node.outputs.enabled == 'true' }}
        working-directory: backend
        run: npm run lint --if-present

      - name: Run backend tests
        if: ${{ steps.detect_backend_node.outputs.enabled == 'true' }}
        working-directory: backend
        run: npm run test --if-present

      - name: Build backend
        if: ${{ steps.detect_backend_node.outputs.enabled == 'true' }}
        working-directory: backend
        run: npm run build --if-present

      - name: Skip backend node CI
        if: ${{ steps.detect_backend_node.outputs.enabled != 'true' }}
        run: echo "backend/package.json not found. Skip backend node CI."

  backend-python-ci:
    name: Backend(Python) Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend python project
        id: detect_backend_python
        run: |
          if [ -f backend/pyproject.toml ] || [ -f backend/requirements.txt ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: ${{ steps.detect_backend_python.outputs.enabled == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: ${{ steps.detect_backend_python.outputs.enabled == 'true' }}
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ]; then
            pip install .
          fi
          pip install pytest

      - name: Run backend tests
        if: ${{ steps.detect_backend_python.outputs.enabled == 'true' }}
        working-directory: backend
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory found in backend/. Skip pytest."
          fi

      - name: Skip backend python CI
        if: ${{ steps.detect_backend_python.outputs.enabled != 'true' }}
        run: echo "backend/pyproject.toml and backend/requirements.txt not found. Skip backend python CI."
